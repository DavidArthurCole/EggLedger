<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EggLedger</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/EggLedger.Web/tailwind.css" />
    <link rel="stylesheet" href="_content/EggLedger.Web/css/app.css" />
    <link rel="stylesheet" href="EggLedger.styles.css" />
    <style>
        /* Hidden until Blazor sets display:block on a circuit error (template default). */
        #blazor-error-ui { display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: #b91c1c; color: #fff; padding: 0.6rem 1rem; z-index: 1000; }
        #blazor-error-ui .reload, #blazor-error-ui .dismiss { color: #fff; margin-left: 0.75rem; cursor: pointer; }
    </style>
</head>

<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&times;</span>
    </div>

    <script>
        // Pipe JS errors to the host (logged in --debug mode; a no-op otherwise).
        function post(m) { try { window.external.sendMessage(m); } catch (e) { } }
        window.onerror = function (msg, src, line, col) { post("onerror: " + msg + " @ " + src + ":" + line + ":" + col); };
        window.addEventListener("unhandledrejection", function (e) { post("unhandledrejection: " + (e.reason && e.reason.stack || e.reason)); });
        var ce = console.error;
        console.error = function () { post("console.error: " + Array.prototype.join.call(arguments, " ")); ce.apply(console, arguments); };

        // Off-origin links would navigate the WebView away from the app. Intercept clicks on
        // external http(s) anchors and hand the URL to the host (OS default browser). Same-origin
        // links (Blazor nav like /missions) fall through to normal in-app routing.
        document.addEventListener("click", function (e) {
            var a = e.target && e.target.closest && e.target.closest("a[href]");
            if (!a) return;
            if (!/^https?:$/i.test(a.protocol) || a.host === location.host) return;
            e.preventDefault();
            post("openurl:" + a.href);
        }, true);
    </script>
    <script src="_content/EggLedger.Web/js/reportChartTooltip.js"></script>
    <script src="_content/EggLedger.Web/js/outsideClick.js"></script>
    <script src="_framework/blazor.webview.js"></script>
</body>

</html>

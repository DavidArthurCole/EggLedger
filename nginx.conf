server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Full default MIME map (text/html, css, js, and application/wasm are all in
    # the stock 1.27 mime.types). Do NOT add a bare types{} block here: it would
    # REPLACE the map and make index.html download instead of render.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Serve the brotli/gzip precompressed siblings when present.
    gzip_static on;

    # DNS resolver for runtime-resolved proxy_pass upstreams (Docker embedded DNS
    # for the ledgersync container name; public DNS for the Egg Inc host).
    resolver 127.0.0.11 1.1.1.1 ipv6=off valid=30s;

    # Egg Inc API proxy. The browser WASM cannot call the auxbrain host directly
    # (CORS), so it calls same-origin /egg-api/* and we forward to the real API.
    # The trailing slash on proxy_pass strips the /egg-api prefix, so
    # /egg-api/ei/bot_first_contact -> https://ctx-dot-auxbrainhome.appspot.com/ei/bot_first_contact.
    location /egg-api/ {
        set $eggapi "ctx-dot-auxbrainhome.appspot.com";
        proxy_pass https://$eggapi/;
        proxy_ssl_server_name on;
        proxy_set_header Host $eggapi;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_body on;
        proxy_buffering off;
    }

    # Cloud-sync + Discord auth API. Same-origin /api/v1/* -> the ledgersync
    # container on the shared proxy network. Set EGGLEDGER_SYNC_UPSTREAM (e.g.
    # "ledgersync:8080") via the container env; defaults to ledgersync:8080.
    location /api/v1/ {
        set $syncupstream "ledgersync:8080";
        proxy_pass http://$syncupstream/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache the immutable fingerprinted framework assets.
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /_content/ {
        try_files $uri =404;
    }

    # SPA fallback: client-side routes resolve to the Blazor host page.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

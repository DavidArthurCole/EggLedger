# Front reverse proxy for the unified EggLedger Blazor Server host.
# No longer baked into the eggledger image (that is now the dotnet app, not nginx).
# This config goes on whatever fronts eggledger.davidarthurcole.me and terminates TLS.
#
# The app runs server-side over a SignalR circuit, so the proxy MUST forward the
# WebSocket Upgrade or the Blazor circuit never connects. Everything (UI, /api/v1/*,
# the in-process egg-api forward) is one upstream. Point at the host IP + published
# SYNC_PORT (the known-good pattern; container-name upstreams hit IPv6-only AAAA here).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Conservative per-IP limits for low-traffic auth/blob endpoints; burst absorbs normal bursts.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=blobs_limit:10m rate=10r/s;

server {
    listen 80;
    server_name eggledger.davidarthurcole.me;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain;

    # No CSP here: Blazor Server needs inline styles/scripts and the SignalR websocket,
    # and a strict policy would need per-circuit nonce plumbing this app doesn't do.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/v1/auth {
        limit_req zone=auth_limit burst=20 nodelay;

        proxy_pass http://192.168.1.66:5015;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/v1/blobs {
        limit_req zone=blobs_limit burst=20 nodelay;

        proxy_pass http://192.168.1.66:5015;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://192.168.1.66:5015;
        proxy_http_version 1.1;

        # WebSocket upgrade for the Blazor Server SignalR circuit.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Circuits are long-lived; don't time them out at 60s.
        proxy_read_timeout 100s;
        proxy_buffering off;
    }
}

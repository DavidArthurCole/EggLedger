server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Full default MIME map (text/html, css, js, and application/wasm are all in
    # the stock 1.27 mime.types). Do NOT add a bare types{} block here: it would
    # REPLACE the map and make index.html download instead of render.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Serve the brotli/gzip precompressed siblings when present.
    gzip_static on;

    # Long-cache the immutable fingerprinted framework assets.
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /_content/ {
        try_files $uri =404;
    }

    # SPA fallback: client-side routes resolve to the Blazor host page.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

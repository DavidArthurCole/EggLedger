server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Full default MIME map (text/html, css, js, and application/wasm are all in
    # the stock 1.27 mime.types). Do NOT add a bare types{} block here: it would
    # REPLACE the map and make index.html download instead of render.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Serve the brotli/gzip precompressed siblings when present.
    gzip_static on;

    # Compress dynamic/proxied responses (the /api/v1/decode JSON is large; the
    # first-contact payload gzips to ~15% of its size). gzip_static covers static
    # assets; this covers proxied upstream responses.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/json application/javascript application/wasm text/css text/plain;

    # DNS resolver for runtime-resolved proxy_pass upstreams (Docker embedded DNS
    # for the ledgersync container name; public DNS for the Egg Inc host).
    resolver 127.0.0.11 1.1.1.1 valid=30s;

    # Egg Inc API proxy. The browser WASM cannot call the auxbrain host directly
    # (CORS), so it calls same-origin /egg-api/* and we forward to the real API.
    # IMPORTANT: proxy_pass with a VARIABLE upstream does NOT auto-strip the
    # location prefix (that only happens with a literal proxy_pass URI), so the
    # rewrite explicitly drops /egg-api before forwarding. Without it auxbrain
    # received /egg-api/ei/... and returned 405. POST body + method pass through.
    location /egg-api/ {
        set $eggapi "ctx-dot-auxbrainhome.appspot.com";
        rewrite ^/egg-api/(.*)$ /$1 break;
        proxy_pass https://$eggapi;
        proxy_ssl_server_name on;
        proxy_set_header Host $eggapi;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    # Cloud-sync + Discord auth API. Same-origin /api/v1/* -> the ledgersync
    # container on the shared proxy network. Variable upstream passes the full
    # original URI (/api/v1/...), which is exactly what ledgersync expects, so no
    # rewrite needed. Change ledgersync:8080 if SYNC_PORT differs.
    location /api/v1/ {
        set $syncupstream "192.168.1.66:5015";
        proxy_pass http://$syncupstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache the immutable fingerprinted framework assets.
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /_content/ {
        try_files $uri =404;
    }

    # SPA fallback: client-side routes resolve to the Blazor host page.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

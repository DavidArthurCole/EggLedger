name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  build-test:
    uses: DavidArthurCole/EggBasket/.github/workflows/dotnet-ci.yml@master
    with:
      solution: EggLedger.slnx
      packages-auth: true
      format-gate: true
    secrets:
      PACKAGES_PAT: ${{ secrets.PACKAGES_PAT }}

  warm-release-cache:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - uses: actions/cache@v6
        with:
          path: tools/tailwind
          key: tailwind-cli-v3.4.17-${{ runner.os }}

      - uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Warm caches via desktop publish
        shell: bash
        run: |
          dotnet publish src/EggLedger.Desktop/EggLedger.Desktop.csproj \
            -c Release -r ${{ matrix.os == 'windows-latest' && 'win-x64' || startsWith(matrix.os, 'macos') && 'osx-arm64' || 'linux-x64' }} \
            --self-contained true -o publish/warm

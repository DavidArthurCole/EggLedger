name: CI

on:
  push:
    branches: ['**']
    tags: ['*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [linux, mac, mac-arm64, windows]
        include:
          - target: linux
            os: ubuntu-latest
            artifact: dist/EggLedger-linux.tar.gz
            artifact_name: EggLedger-linux
          - target: mac
            os: macos-latest
            artifact: dist/EggLedger-mac.zip
            artifact_name: EggLedger-mac
          - target: mac-arm64
            os: macos-latest
            artifact: dist/EggLedger-mac-arm64.zip
            artifact_name: EggLedger-mac-arm64
          - target: windows
            os: ubuntu-latest
            artifact: dist/EggLedger.exe
            artifact_name: EggLedger-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false

      - uses: ./.github/actions/setup-ledger-buildspace
        with:
          target: ${{ matrix.target }}

      - name: Upload artifact
        uses: christopherHX/gitea-upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact }}
          generate_release_notes: true

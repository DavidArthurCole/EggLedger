name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      # SyncKit.* lives on GitHub Packages. The GitHub NuGet feed requires auth even for
      # public packages, and the per-run GITHUB_TOKEN only reads THIS repo's packages, so
      # use an account-level PAT (read:packages) stored as the PACKAGES_PAT secret.
      - name: Authenticate GitHub Packages
        run: |
          dotnet nuget update source github \
            --username DavidArthurCole \
            --password ${{ secrets.PACKAGES_PAT }} \
            --store-password-in-clear-text \
            --configfile nuget.config

      - run: dotnet test EggLedger.slnx -c Release

  # Seed the per-OS NuGet + Tailwind-CLI caches on master so the tag-triggered release
  # workflow restores them via default-branch fallback (tag runs cannot share caches
  # across tags). Keys here MUST match release.yml exactly. Desktop publish only, since
  # that is the graph release builds; no SyncKit/GitHub Packages auth needed for it.
  warm-release-cache:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - uses: actions/cache@v6
        with:
          path: tools/tailwind
          key: tailwind-cli-v3.4.17-${{ runner.os }}

      - uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Warm caches via desktop publish
        shell: bash
        run: |
          dotnet publish src/EggLedger.Desktop/EggLedger.Desktop.csproj \
            -c Release -r ${{ matrix.os == 'windows-latest' && 'win-x64' || startsWith(matrix.os, 'macos') && 'osx-arm64' || 'linux-x64' }} \
            --self-contained true -o publish/warm

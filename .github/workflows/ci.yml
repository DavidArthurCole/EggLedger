name: CI

on:
  push:
    branches: ['**']
    tags: ['*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [linux, mac, mac-arm64, windows]
        include:
          - target: linux
            os: ubuntu-latest
            artifact: dist/EggLedger-linux.tar.gz
            artifact_name: EggLedger-linux
          - target: mac
            os: macos-latest
            artifact: dist/EggLedger-mac.zip
            artifact_name: EggLedger-mac
          - target: mac-arm64
            os: macos-latest
            artifact: dist/EggLedger-mac-arm64.zip
            artifact_name: EggLedger-mac-arm64
          - target: windows
            os: windows-latest
            artifact: dist/EggLedger.exe
            artifact_name: EggLedger-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false

      - uses: ./.github/actions/setup-ledger-buildspace
        with:
          target: ${{ matrix.target }}

      - name: Check signing prerequisites
        id: signing-check
        if: matrix.target == 'windows' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Sign Windows executable
        if: steps.signing-check.outputs.available == 'true'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifact
        uses: christopherHX/gitea-upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact }}
          generate_release_notes: false

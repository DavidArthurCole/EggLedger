name: Create release

on:
  push:
    tags: 
      - '*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release 
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
    outputs:
      release_tag: ${{ github.ref_name }}

  build_release:
    name: Build Release
    needs: create_release
    strategy:
      matrix:
        target: [linux, mac, mac-arm64 , windows]
        include:
          - target: linux
            os: ubuntu-latest
          - target: mac
            os: macos-latest
          - target: mac-arm64
            os: macos-latest
          - target: windows
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false

      - uses: ./.github/actions/setup-ledger-buildspace
        with:
          target: ${{ matrix.target }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create_release.outputs.release_tag }}
          files: | 
            dist/EggLedger-mac.zip
            dist/EggLedger-mac-arm64.zip
            dist/EggLedger-linux.tar.gz
            dist/EggLedger.exe

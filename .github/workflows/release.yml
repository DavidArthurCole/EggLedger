name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  # Build the Blazor Server image and push to GHCR. The Dockerfile restores SyncKit.* from
  # GitHub Packages using a build secret; the workflow GITHUB_TOKEN supplies read:packages.
  # frame pulls the prebuilt image (no build, no PAT on the host).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase; the repo name has capitals.
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # Desktop builds per RID. Asset names must match GithubReleaseClient.ExpectedAssetName().
  desktop:
    name: Desktop (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            asset: EggLedger-linux.tar.gz
            kind: targz
          - rid: osx-x64
            os: macos-15
            asset: EggLedger-mac.zip
            kind: zip
          - rid: osx-arm64
            os: macos-15
            asset: EggLedger-mac-arm64.zip
            kind: zip
          - rid: win-x64
            os: windows-latest
            asset: EggLedger.exe
            kind: rawexe
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Tag runs cannot share caches across tags; these restore the entries the CI
      # workflow seeds on master (default-branch fallback). Tailwind CLI v3.4.17 keyed by OS.
      - uses: actions/cache@v6
        with:
          path: tools/tailwind
          key: tailwind-cli-v3.4.17-${{ runner.os }}

      - uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Stamp the real release version from the tag (v3.0.0-beta.18 -> 3.0.0-beta.18) so the
      # updater's SemVersion compare works; Directory.Build.props only holds the dev default.
      - name: Publish
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish src/EggLedger.Desktop/EggLedger.Desktop.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:EggLedgerVersion="$VERSION" \
            -o publish/${{ matrix.rid }}

      # Skip signing when the Azure secret is absent, so unsigned dry-runs still build.
      - name: Check signing prerequisites
        id: signing
        if: matrix.kind == 'rawexe'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then echo "available=true" >> "$GITHUB_OUTPUT"; else echo "available=false" >> "$GITHUB_OUTPUT"; fi

      # The root nuget.config's packageSourceMapping (pins SyncKit.* to GitHub Packages) makes
      # the signing action's `sign` tool install fail: --add-source is rejected under source
      # mapping. Restore already ran in Publish, so hide the config for the signing step only.
      - name: Hide nuget.config for signing
        if: matrix.kind == 'rawexe' && steps.signing.outputs.available == 'true'
        shell: bash
        run: mv nuget.config nuget.config.bak

      - name: Sign Windows executable
        if: matrix.kind == 'rawexe' && steps.signing.outputs.available == 'true'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: publish/win-x64
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Windows ships the raw signed exe; others are archived.
      - name: Package
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          case "${{ matrix.kind }}" in
            targz) tar -czf "../../${{ matrix.asset }}" . ;;
            zip)   zip -r "../../${{ matrix.asset }}" . ;;
            rawexe) cp EggLedger.exe "../../${{ matrix.asset }}" ;;
          esac

      # One "hash␠␠filename" line per asset; the checksums job concatenates them into SHA256SUMS.
      - name: Hash
        shell: bash
        run: sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

      - name: Upload checksum line
        uses: actions/upload-artifact@v7
        with:
          name: sha-${{ matrix.rid }}
          path: ${{ matrix.asset }}.sha256

  # Gather the per-asset hash lines into one SHA256SUMS asset the self-updater verifies against.
  checksums:
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: sha-*
          merge-multiple: true
          path: sums
      - run: cat sums/*.sha256 > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS

  # Build the Blazor Server image and push to GHCR; frame pulls the prebuilt image.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase; the repo name has capitals.
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          secrets: |
            github_token=${{ secrets.PACKAGES_PAT }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

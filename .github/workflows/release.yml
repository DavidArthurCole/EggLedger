name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # Desktop builds per RID. Asset names must match GithubReleaseClient.ExpectedAssetName().
  desktop:
    name: Desktop (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            asset: EggLedger-linux.tar.gz
            kind: targz
          - rid: osx-x64
            os: macos-latest
            asset: EggLedger-mac.zip
            kind: zip
          - rid: osx-arm64
            os: macos-latest
            asset: EggLedger-mac-arm64.zip
            kind: zip
          - rid: win-x64
            os: windows-latest
            asset: EggLedger.exe
            kind: rawexe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/EggLedger.Desktop/EggLedger.Desktop.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -o publish/${{ matrix.rid }}

      # Skip signing when the Azure secret is absent, so unsigned dry-runs still build.
      - name: Check signing prerequisites
        id: signing
        if: matrix.kind == 'rawexe'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then echo "available=true" >> "$GITHUB_OUTPUT"; else echo "available=false" >> "$GITHUB_OUTPUT"; fi

      - name: Sign Windows executable
        if: matrix.kind == 'rawexe' && steps.signing.outputs.available == 'true'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: publish/win-x64
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Windows ships the raw signed exe; others are archived.
      - name: Package
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          case "${{ matrix.kind }}" in
            targz) tar -czf "../../${{ matrix.asset }}" . ;;
            zip)   zip -r "../../${{ matrix.asset }}" . ;;
            rawexe) cp EggLedger.exe "../../${{ matrix.asset }}" ;;
          esac

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  # Build the Blazor Server image and push to GHCR; frame pulls the prebuilt image.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase; the repo name has capitals.
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          secrets: |
            github_token=${{ secrets.PACKAGES_PAT }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

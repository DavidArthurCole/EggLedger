name: Setup Ledger Buildspace
description: Shared setup and build logic for EggLedger

inputs:
  target:
    required: true
    description: Build target (linux, mac, mac-arm64, windows)

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: true
        cache-dependency-path: go.sum

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: lts/*
        cache: npm

    - name: Install Linux build dependencies
      if: runner.os == 'Linux'
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: protobuf-compiler protoc-gen-go dos2unix
        version: 1.0

    - name: Cache macOS Homebrew downloads
      if: runner.os == 'macOS'
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/Homebrew/downloads
        key: brew-protobuf-protoc-gen-go-dos2unix-v1

    - name: Install macOS build dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install protobuf protoc-gen-go dos2unix || true

    - name: Cache Windows Chocolatey packages
      id: choco-cache
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          C:\ProgramData\chocolatey\lib\make
          C:\ProgramData\chocolatey\lib\dos2unix
          C:\ProgramData\chocolatey\lib\protoc
          C:\ProgramData\chocolatey\bin\make.exe
          C:\ProgramData\chocolatey\bin\dos2unix.exe
          C:\ProgramData\chocolatey\bin\protoc.exe
        key: choco-make-dos2unix-protoc-v1

    - name: Install Windows build dependencies
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if ("${{ steps.choco-cache.outputs.cache-hit }}" -ne "true") {
          choco install make dos2unix protoc -y --no-progress
        }
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

    - name: Build
      shell: bash
      run: |
        case "${{ inputs.target }}" in
          linux) make dist-linux ;;
          mac) make dist-mac ;;
          mac-arm64) make dist-mac-arm ;;
          windows) make dist-windows ;;
          *) echo "Unknown target"; exit 1 ;;
        esac
